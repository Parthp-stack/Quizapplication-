{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4">
            <h2 class="text-center mb-4"><i class="fas fa-medal text-warning me-2"></i> Leaderboard</h2>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for score in scores %}
                        <tr>
                            <td>{{ loop.index }}</td>
                            <td>{{ score.user.name }}</td>
                            <td class="text-capitalize">{{ score.category }}</td>
                            <td><strong>{{ score.score }}/{{ score.total_questions }}</strong></td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="4" class="text-center">No scores yet. Be the first!</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            <div class="text-center mt-3">
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Start a Quiz</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
